name: ai

on:
  workflow_dispatch:  # Manual trigger
  pull_request:

env:
  JAVA_VERSION: 17
  JAVA_DISTRIBUTION: 'temurin'

jobs:



  AiReview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: ollama serve &

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Run Claude Code
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.base_ref || 'main' }}
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: 128000
        run: |
          ollama launch claude \
            --model gemma4:12b \
            --yes \
            -- --dangerously-skip-permissions \
            --print \
            "You are running in a fully automated CI/CD pipeline. Do NOT ask any questions or request confirmation. Do NOT wait for user input. Make all decisions autonomously. If something is unclear, make a reasonable assumption and proceed. \
            Review the pull request changes by running: git diff origin/${BASE_REF}...HEAD \
            Examine each changed file carefully. For each issue found, note the file and line number. \
            Evaluate the changes for: (1) bugs and logic errors, (2) security vulnerabilities such as injection, auth bypass, or exposed secrets, (3) code quality and adherence to existing patterns in the codebase, (4) missing or inadequate tests, (5) performance concerns. \
            Output a structured Markdown review with these sections: ## Summary (brief description of what the PR does), ## Issues (list any bugs or problems with file:line references, or 'None found'), ## Suggestions (improvement ideas that are not blocking), ## Verdict (one of: APPROVE / REQUEST_CHANGES / COMMENT)."



  AiFix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: ollama serve &

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Run Claude Code
        env:
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: 128000
        run: |
          ollama launch claude \
            --model gemma4:12b \
            --yes \
            -- --dangerously-skip-permissions \
            --print \
            "You are running in a fully automated CI/CD pipeline. Do NOT ask any questions or request confirmation. Do NOT wait for user input. Make all decisions autonomously. If something is unclear, make a reasonable assumption and proceed. \
            Verify project with `./gradlew run` command. Fix issue if we have any."

      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: AI review
